services:
  backend:
    build:
      context: .
      args:
        DATABASE_URL: ${DATABASE_URL_DEPLOY}
    env_file: .env
    ports:
      - "9800:9800"
    environment:
      DATABASE_URL: ${DATABASE_URL_DEPLOY}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  migrate:
    build: .
    command: bunx prisma migrate deploy
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL_DEPLOY}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
